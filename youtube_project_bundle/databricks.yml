# This is a Databricks asset bundle definition for youtube_project_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: youtube_project_bundle
  uuid: fe7e0096-1bec-4703-b6a2-c779d8c7765d

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: WarehouseID

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-1ecc2d01-e312.cloud.databricks.com
    variables:
      catalog: youtube_dev
      schema: dev
      warehouse_id: 4adc0ab1f019ca6f
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-1ecc2d01-e312.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ssagarprajapati@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/PROD_Youtube_GeekCoders_Project
    variables:
      catalog: youtube_prod
      schema: prod
      warehouse_id: 4adc0ab1f019ca6f
    permissions:
      - user_name: ssagarprajapati@gmail.com
        level: CAN_MANAGE
